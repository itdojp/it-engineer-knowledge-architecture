name: Deploy Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  deployments: read
  pages: write
  security-events: read
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll -v 4.4.1

      - name: Build site
        run: jekyll build --source docs --destination _site --baseurl /it-engineer-knowledge-architecture

      - name: Setup Node.js for build metadata
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Restore sanitized health cache
        uses: actions/cache@v5
        with:
          path: tmp/portfolio-health/cache
          key: portfolio-health-v2-${{ github.run_id }}
          restore-keys: |
            portfolio-health-v2-

      - name: Generate portfolio health snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PORTFOLIO_HEALTH_CONCURRENCY: '3'
          # Keep Pages deployment bounded; the scheduled workflow owns multi-attempt retries.
          PORTFOLIO_HEALTH_MAX_ATTEMPTS: '1'
          PORTFOLIO_HEALTH_RETRY_DELAY_MS: '250'
        run: |
          node scripts/portfolio-health-cli.mjs \
            --snapshot-dir _site \
            --report-json tmp/portfolio-health/report.json \
            --report-html tmp/portfolio-health/index.html \
            --report-markdown tmp/portfolio-health/summary.md \
            --cache-dir tmp/portfolio-health/cache

      - name: Add deployment build information
        run: node scripts/write-build-info.mjs _site/build-info.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  post-deploy-smoke:
    name: Production smoke
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Verify production deployment
        id: smoke
        continue-on-error: true
        run: |
          node scripts/smoke-production.mjs \
            --base-url "${{ needs.deploy.outputs.page_url }}" \
            --expected-sha "${{ github.sha }}" \
            --max-attempts 8 \
            --retry-delay-ms 3000 \
            --timeout-ms 15000 \
            --report-json tmp/production-smoke/report.json \
            --report-markdown tmp/production-smoke/report.md

      - name: Add smoke result to job summary
        if: always()
        run: |
          if [[ -f tmp/production-smoke/report.md ]]; then
            cat tmp/production-smoke/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Production smoke did not create a report.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload production smoke report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: production-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: tmp/production-smoke
          if-no-files-found: error

      - name: Enforce production smoke result
        if: always() && steps.smoke.outcome != 'success'
        run: |
          echo 'Production smoke failed. See the job summary and artifact.' >&2
          exit 1

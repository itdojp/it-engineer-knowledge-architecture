name: 📚 学習パス検証

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'roadmap/**'
      - 'books/**'
      - 'README.md'
      - 'docs/index.md'
      - 'docs/en/**'
      - 'docs/_layouts/**'
      - 'docs/books/**'
      - 'docs/paths/**'
      - 'docs/404.html'
      - '.github/workflows/**'
      - 'docs/_data/**'
      - 'docs/publishing/book-registry.json'
      - 'schemas/**'
      - 'scripts/**'
      - 'tests/fixtures/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'roadmap/**'
      - 'books/**'
      - 'README.md'
      - 'docs/index.md'
      - 'docs/en/**'
      - 'docs/_layouts/**'
      - 'docs/books/**'
      - 'docs/paths/**'
      - 'docs/404.html'
      - '.github/workflows/**'
      - 'docs/_data/**'
      - 'docs/publishing/book-registry.json'
      - 'schemas/**'
      - 'scripts/**'
      - 'tests/fixtures/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  validate-learning-paths:
    runs-on: ubuntu-latest
    name: 学習パス整合性チェック

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js設定
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm依存関係確認
        run: npm ci

      - name: カタログ正本・学習グラフ検証
        run: npm run verify

      - name: マークダウンリンクチェック
        run: |
          echo "🔗 マークダウンリンクチェック中..."

          # 内部リンクの存在確認
          find . -name "*.md" -exec grep -l "\[.*\](.*\.md)" {} \; | while read file; do
            echo "チェック中: $file"
            grep -oE "\[.*\]\([^)]*\.md[^)]*\)" "$file" | while read link; do
              path=$(echo "$link" | sed -E 's/.*\(([^)]*)\).*/\1/')

              # 外部リンク（http/https）はファイル存在チェックの対象外
              if [[ "$path" =~ ^https?:// ]]; then
                continue
              fi

              # クエリ/アンカーは存在チェック時に除去
              path="${path%%#*}"
              path="${path%%\?*}"

              if [[ "$path" == /* ]]; then
                # 絶対パス
                full_path=".${path}"
              else
                # 相対パス
                dir=$(dirname "$file")
                full_path="$dir/$path"
              fi

              if [ ! -f "$full_path" ]; then
                echo "❌ リンク切れ: $file で $path が見つかりません"
                exit 1
              fi
            done
          done

          echo "✅ リンクチェック通過"

  build-site:
    runs-on: ubuntu-latest
    name: Jekyllサイト生成チェック

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Ruby設定
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Jekyllインストール
        run: gem install jekyll -v 4.4.1

      - name: Jekyll build
        run: jekyll build --source docs --destination .site --baseurl /it-engineer-knowledge-architecture

      - name: 主要ページ構造チェック
        run: |
          python3 - <<'PY'
          from pathlib import Path
          root = Path('.site')
          checks = {
              'index.html': ['<main id="main-content"', '本文へスキップ', '/it-engineer-knowledge-architecture/books/', '/it-engineer-knowledge-architecture/paths/'],
              'books/index.html': ['書籍一覧', 'data-book-card', '全 49 件', 'ai-agent-collaboration-book'],
              'paths/index.html': ['学習パス', 'beginner-linux', 'book-sequence'],
              '404.html': ['ページが見つかりません', '/it-engineer-knowledge-architecture/books/', '/it-engineer-knowledge-architecture/paths/'],
              'en/index.html': ['English Catalog', '<html lang="en"'],
          }
          for rel, markers in checks.items():
              text = (root / rel).read_text(encoding='utf-8')
              h1_count = text.lower().count('<h1')
              missing = [marker for marker in markers if marker not in text]
              if h1_count != 1 or missing:
                  raise SystemExit(f'{rel}: h1_count={h1_count}, missing={missing}')
          print('site structure OK')
          PY

  validate-yaml-structure:
    runs-on: ubuntu-latest
    name: YAML構造検証

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: YAMLlint設定
        run: |
          pip install yamllint

      - name: YAML構文チェック
        run: |
          echo "📄 YAML構文チェック中..."
          find . -name "*.yml" -o -name "*.yaml" | xargs yamllint -d '{extends: relaxed, rules: {line-length: disable}}'
          echo "✅ YAML構文チェック通過"

  generate-stats:
    runs-on: ubuntu-latest
    name: 統計情報生成
    needs: [validate-learning-paths, validate-yaml-structure]

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js設定
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 学習パス統計生成
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const catalog = JSON.parse(fs.readFileSync('docs/_data/catalog.json', 'utf8'));
          const books = catalog.books || [];
          const expected = catalog.expectedCounts || {};
          const main = books.filter((b) => b.countingGroup === 'main-lineup' && b.countedInMainLineup).length;
          const planned = books.filter((b) => b.countingGroup === 'planned').length;
          const related = books.filter((b) => b.countingGroup === 'related-independent').length;
          const categories = new Map();
          for (const book of books) categories.set(book.category, (categories.get(book.category) || 0) + 1);
          const lines = [];
          lines.push('## 📚 書籍統計');
          lines.push('');
          lines.push(`- メインライン公開書籍: ${main}冊`);
          lines.push(`- 計画書籍: ${planned}冊`);
          lines.push(`- 関連する独立書籍: ${related}冊`);
          lines.push('');
          lines.push('### カテゴリ別');
          for (const [category, count] of [...categories].sort()) lines.push(`- ${category}: ${count}件`);
          lines.push('');
          lines.push(`期待値: main=${expected.mainLineup}, planned=${expected.planned}, relatedIndependent=${expected.relatedIndependent}`);
          fs.writeFileSync('stats.md', lines.join('\n') + '\n');
          console.log(lines.join('\n'));
          NODE

      - name: 統計をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: learning-path-stats
          path: stats.md

name: 📖 書籍ステータス更新

on:
  schedule:
    # 毎日午前9時（JST）に実行
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  update-book-status:
    runs-on: ubuntu-latest
    name: 書籍ステータス確認
    env:
      TZ: Asia/Tokyo

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm依存関係確認
        run: npm ci

      - name: 進捗レポート生成（artifact用）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-progress-report.js

      - name: 進捗レポートをartifact保存
        uses: actions/upload-artifact@v4
        with:
          name: book-status-report
          path: |
            docs/progress_report.md
            tmp/book_status.json

      - name: GitHub CLI設定
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: アラート通知（問題がある場合）
        run: |
          set -euo pipefail
          echo "🚨 アラートチェック中..."

          unavailable_count=$(jq '.books | map(select(.status == "unavailable")) | length' tmp/book_status.json)

          if [ "$unavailable_count" -gt 0 ]; then
            echo "⚠️ $unavailable_count 冊の書籍にアクセスできません"

            existing_alert=$(gh issue list --label "alert,book-unavailable" --state open --json number --jq length)

            if [ "$existing_alert" -eq 0 ]; then
              unavailable_books=$(jq -r '.books[] | select(.status == "unavailable") | .name' tmp/book_status.json)
              issue_body_file="tmp/book-unavailable-issue.md"
              {
                echo "以下の書籍にアクセスできませんでした:"
                echo ""
                echo "$unavailable_books"
                echo ""
                echo "**検出日時**: $(date '+%Y-%m-%d %H:%M:%S JST')"
                echo "**確認結果artifact**: book-status-report"
                echo ""
                echo "このIssueは自動生成されました。問題が解決されたら手動でクローズしてください。"
              } > "$issue_body_file"

              gh issue create \
                --title "🚨 書籍アクセス異常検出" \
                --label "alert,book-unavailable" \
                --body-file "$issue_body_file"
            fi
          else
            echo "✅ すべての書籍は正常にアクセス可能です"
          fi

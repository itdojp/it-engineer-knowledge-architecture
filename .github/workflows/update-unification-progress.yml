name: Update Unification Progress

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate dashboard artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tmp
          python3 - << 'PY'
          import os, re, json, urllib.request
          from datetime import datetime, timezone

          def gh_api(path):
              import time, urllib.error
              for attempt in range(5):
                  try:
                      req=urllib.request.Request(f'https://api.github.com{path}', headers={'Authorization': f'Bearer {os.environ.get("GITHUB_TOKEN","")}', 'Accept':'application/vnd.github+json'})
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.load(r)
                  except urllib.error.HTTPError as e:
                      if e.code in (403, 404, 429) and attempt < 4:
                          time.sleep(2*(attempt+1))
                          continue
                      raise
                  except Exception:
                      if attempt < 4:
                          time.sleep(2*(attempt+1))
                          continue
                      raise
              raise RuntimeError('github api retries exceeded')

          issue=gh_api('/repos/itdojp/it-engineer-knowledge-architecture/issues/21')
          body=issue.get('body','')
          slugs=[re.sub(r'^https://github.com/','',ln.split()[2]) for ln in body.splitlines() if ln.strip().startswith('- [ ] https://github.com/')]
          slugs=[s for s in slugs if s!='itdojp/linux-infra-textbook']

          def find_pr(slug, keyword):
              prs=gh_api(f'/repos/{slug}/pulls?state=all&per_page=100')
              for pr in prs:
                  if keyword in pr.get('title',''):
                      return pr.get('html_url',''), pr.get('state','').upper()
              return '', ''

          def has_nav_data(slug):
              try:
                  gh_api(f'/repos/{slug}/contents/docs/_data/navigation.yml')
                  return 'yes'
              except Exception:
                  return 'no'

          def ci_conclusion(slug):
              try:
                  runs=gh_api(f'/repos/{slug}/actions/runs?per_page=20')
                  for run in runs.get('workflow_runs',[]):
                      if run.get('name')=='Nav + Pages Link Check':
                          return run.get('conclusion') or '-'
                  return '-'
              except Exception:
                  return '-'

          def pages_code(name):
              try:
                  with urllib.request.urlopen(f'https://itdojp.github.io/{name}/', timeout=30) as r:
                      return r.getcode()
              except Exception:
                  return 0

          rows=[]
          for slug in slugs:
              name=slug.split('/')[-1]
              f_url,f_state=find_pr(slug,'Unify format v3: defaults/permalink update')
              n_url,n_state=find_pr(slug,'Unify bottom navigation (prev/next) with fallback logic')
              nav=has_nav_data(slug)
              ci=ci_conclusion(slug)
              code=pages_code(name)
              rows.append((name,f_url,f_state,n_url,n_state,nav,ci,code))

          out=['# 書籍フォーマット統一 進捗ダッシュボード','',f'生成日時: {datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%SZ")}', '', 'このファイルは定期Workflow artifactとして生成され、mainへ自動コミットしません。', '', '| 書籍 | format PR | 状態 | nav PR | 状態 | nav-data | CI (Nav+Pages) | Pages base |','|---|---|---|---|---|---|---|---|']
          for (name,f_url,f_state,n_url,n_state,nav,ci,code) in rows:
              out.append(f'| {name} | {f_url or "-"} | {f_state or "-"} | {n_url or "-"} | {n_state or "-"} | {nav} | {ci or "-"} | {code} |')
          out.append('')
          out.append('凡例:')
          out.append('- format PR: `_config.yml` の defaults/permalink 統一')
          out.append('- nav PR: 下部ナビの共通include適用')
          out.append('- nav-data: `docs/_data/navigation.yml` の有無')
          out.append('- CI: Nav + Pages Link Check の最新結論')
          out.append('- Pages base: ベースURLのHTTPコード')
          out.append('')
          out.append('備考: linux-infra-textbook は linux-infra-textbook2 に置換済みの旧版（統一対象外/アーカイブ）')
          with open('tmp/unification-progress.md','w',encoding='utf-8') as f:
              f.write('\n'.join(out)+'\n')
          PY

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v6
        with:
          name: unification-progress
          path: tmp/unification-progress.md
